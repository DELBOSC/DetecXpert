name: CI

# Configuration de concurrency pour annuler les runs obsolètes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read
  security-events: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false -Dkotlin.compiler.execution.strategy=in-process"
  JAVA_VERSION: '17'
  XCODE_VERSION: '14.2'
  NODE_VERSION: '18'
  MIN_COVERAGE: '70'  # Seuil minimal de couverture de code en pourcentage

jobs:
  setup:
    name: Configuration initiale
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - name: Vérification du skip
        id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          paths_ignore: '["**/*.md", "docs/**", ".github/*.md", ".github/ISSUE_TEMPLATE/**", ".github/PULL_REQUEST_TEMPLATE.md"]'
          
      - name: Checkout
        if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validation du wrapper Gradle
        if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        uses: gradle/wrapper-validation-action@v2

      - name: Vérification du style de code
        if: ${{ steps.skip_check.outputs.should_skip != 'true' }}
        run: |
          set -eo pipefail
          ./gradlew ktlintCheck
        continue-on-error: false

  # Modules Core avec matrice
  core-modules:
    name: Build et Test (Core ${{ matrix.module }})
    needs: setup
    if: ${{ needs.setup.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        module: ['config', 'errors', 'logging', 'threading']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Installation xmlstarlet
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends xmlstarlet || echo "xmlstarlet non disponible"
        continue-on-error: true

      - name: Build module ${{ matrix.module }}
        id: build
        run: |
          set -eo pipefail
          ./gradlew :core:${{ matrix.module }}:assemble --stacktrace
        # Critique - doit réussir
        continue-on-error: false

      - name: Test module ${{ matrix.module }}
        id: test
        run: |
          set -eo pipefail
          ./gradlew :core:${{ matrix.module }}:test --stacktrace
        # Critique - doit réussir
        continue-on-error: false

      - name: Analyse de couverture avec Jacoco
        id: jacoco
        run: |
          set -eo pipefail
          ./gradlew :core:${{ matrix.module }}:jacocoTestReport
          
          # Vérification automatique du seuil de couverture
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Sur PR, échec si seuil non atteint
            ./gradlew :core:${{ matrix.module }}:jacocoTestCoverageVerification
          else
            # Sur autres événements, uniquement rapport
            ./gradlew :core:${{ matrix.module }}:jacocoTestCoverageVerification || echo "Couverture insuffisante"
          fi
          
          # Extraction du pourcentage depuis XML (plus stable que l'HTML)
          COVERAGE_XML="core/${{ matrix.module }}/build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$COVERAGE_XML" ]; then
            # Utilisation de xmlstarlet avec une expression XPath 1.0 valide
            if command -v xmlstarlet &> /dev/null; then
              COVERAGE=$(xmlstarlet sel -t -v "round((number(//counter[@type='LINE']/@covered) div (number(//counter[@type='LINE']/@covered) + number(//counter[@type='LINE']/@missed))) * 100)" "$COVERAGE_XML")
            else
              # Fallback sur méthode moins fiable avec grep/sed
              COVERAGE_FILE="core/${{ matrix.module }}/build/reports/jacoco/test/html/index.html"
              if [ -f "$COVERAGE_FILE" ]; then
                COVERAGE=$(grep -o 'Total[^%]*%' "$COVERAGE_FILE" | grep -o '[0-9]\+' || echo "0")
              else
                COVERAGE="0"
              fi
            fi
            
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            
            # Vérification du seuil de couverture
            if [ "$COVERAGE" -lt "${{ env.MIN_COVERAGE }}" ]; then
              echo "::warning::La couverture du module ${{ matrix.module }} est de $COVERAGE%, ce qui est inférieur au seuil minimal de ${{ env.MIN_COVERAGE }}%"
            else
              echo "::notice::La couverture du module ${{ matrix.module }} est de $COVERAGE%"
            fi
          else
            echo "::warning::Impossible de trouver le rapport de couverture pour ${{ matrix.module }}"
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi
        # Continue-on-error uniquement pour les non-PR
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      - name: Publier les résultats de test
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: 'core/${{ matrix.module }}/build/test-results/test/TEST-*.xml'
          check_name: 'Résultats de test - Core ${{ matrix.module }}'
          fail_on_failure: false

      - name: Upload des artefacts de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.module }}-test-results
          path: |
            core/${{ matrix.module }}/build/reports/tests/test/
            core/${{ matrix.module }}/build/reports/jacoco/
          retention-days: 5

  # Modules Domain avec matrice optimisée
  domain-modules:
