  # Build Android
  android-build:
    name: Build Android
    needs: setup
    if: ${{ needs.setup.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Installation xmlstarlet
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends xmlstarlet || echo "xmlstarlet non disponible"
        continue-on-error: true

      - name: Cache Android
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
          key: ${{ runner.os }}-android-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: Build Android Debug
        id: build
        run: |
          set -eo pipefail
          ./gradlew :platform:android:assembleDebug --stacktrace
        # Critique - doit réussir
        continue-on-error: false

      - name: Tests unitaires Android
        id: test
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -eo pipefail
          ./gradlew :platform:android:testDebugUnitTest --stacktrace
        continue-on-error: false

      - name: Tests unitaires Android (non critique)
        id: test-non-critical
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -eo pipefail
          ./gradlew :platform:android:testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Analyse de couverture avec Jacoco
        id: jacoco
        run: |
          set -eo pipefail
          ./gradlew :platform:android:jacocoTestReport
          
          # Vérification automatique du seuil de couverture
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Sur PR, échec si seuil non atteint
