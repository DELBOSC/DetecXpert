        run: |
          set -eo pipefail
          ./gradlew :domain:${{ matrix.module.name }}:assemble --stacktrace
        # Critique - doit réussir
        continue-on-error: false

      # Utilisez if + continue-on-error plutôt qu'une expression booléenne complexe
      - name: Test module ${{ matrix.module.name }}
        id: test
        if: ${{ matrix.module.critical || github.event_name == 'pull_request' }}
        run: |
          set -eo pipefail
          ./gradlew :domain:${{ matrix.module.name }}:test --stacktrace
        continue-on-error: false

      - name: Test module ${{ matrix.module.name }} (non critique)
        id: test-non-critical
        if: ${{ !matrix.module.critical && github.event_name != 'pull_request' }}
        run: |
          set -eo pipefail
          ./gradlew :domain:${{ matrix.module.name }}:test --stacktrace
        continue-on-error: true

      - name: Analyse de couverture avec Jacoco
        id: jacoco
        run: |
          set -eo pipefail
          ./gradlew :domain:${{ matrix.module.name }}:jacocoTestReport
          
          # Vérification automatique du seuil de couverture
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Sur PR, échec si seuil non atteint
            ./gradlew :domain:${{ matrix.module.name }}:jacocoTestCoverageVerification
          else
            # Sur autres événements, uniquement rapport
            ./gradlew :domain:${{ matrix.module.name }}:jacocoTestCoverageVerification || echo "Couverture insuffisante"
          fi
          
          # Extraction du pourcentage depuis XML (plus stable que l'HTML)
          COVERAGE_XML="domain/${{ matrix.module.name }}/build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$COVERAGE_XML" ]; then
            # Utilisation de xmlstarlet avec une expression XPath 1.0 valide
            if command -v xmlstarlet &> /dev/null; then
              COVERAGE=$(xmlstarlet sel -t -v "round((number(//counter[@type='LINE']/@covered) div (number(//counter[@type='LINE']/@covered) + number(//counter[@type='LINE']/@missed))) * 100)" "$COVERAGE_XML")
            else
              # Fallback sur méthode moins fiable avec grep/sed
              COVERAGE_FILE="domain/${{ matrix.module.name }}/build/reports/jacoco/test/html/index.html"
              if [ -f "$COVERAGE_FILE" ]; then
                COVERAGE=$(grep -o 'Total[^%]*%' "$COVERAGE_FILE" | grep -o '[0-9]\+' || echo "0")
              else
                COVERAGE="0"
              fi
            fi
            
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            
            # Vérification du seuil de couverture
            if [ "$COVERAGE" -lt "${{ env.MIN_COVERAGE }}" ]; then
              echo "::warning::La couverture du module ${{ matrix.module.name }} est de $COVERAGE%, ce qui est inférieur au seuil minimal de ${{ env.MIN_COVERAGE }}%"
            else
              echo "::notice::La couverture du module ${{ matrix.module.name }} est de $COVERAGE%"
            fi
          else
            echo "::warning::Impossible de trouver le rapport de couverture pour ${{ matrix.module.name }}"
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      - name: Publier les résultats de test
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: 'domain/${{ matrix.module.name }}/build/test-results/test/TEST-*.xml'
          check_name: 'Résultats de test - Domain ${{ matrix.module.name }}'
          fail_on_failure: false

      - name: Upload des artefacts de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-${{ matrix.module.name }}-test-results
          path: |
            domain/${{ matrix.module.name }}/build/reports/tests/test/
            domain/${{ matrix.module.name }}/build/reports/jacoco/
          retention-days: 5

  # Modules Feature avec matrice optimisée
