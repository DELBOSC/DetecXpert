        module:
          - { name: 'detection', critical: true }
          - { name: 'user', critical: true }
          - { name: 'mapping', critical: true }  
          - { name: 'equipment', critical: false }
          - { name: 'findings', critical: false }
          - { name: 'session', critical: false }
          - { name: 'collaboration', critical: false }
          - { name: 'legal', critical: false }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
