name: CI DetectXpert

# ─── Déclencheurs ───────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# ─── Permissions ────────────────────────────────────────────────────────────────
permissions:
  contents: read
  id-token: write

# ─── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  # 1. Validation de l’environnement
  detect-environment:
    name: Détecter l’environnement
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.check_env.outputs.is_valid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier prérequis
        id: check_env
        uses: ./.github/actions/detect-environment
        with:
          verify_dependencies: true
          detect_network: false
          output_format: json

  # 2. Génération de la matrice de tests
  generate-matrix:
    name: Générer la matrice
    needs: detect-environment
    runs-on: ubuntu-latest
    outputs:
      matrix:         ${{ steps.matrix.outputs.matrix }}
      matrix-include: ${{ steps.matrix.outputs.matrix-include }}
      matrix-exclude: ${{ steps.matrix.outputs.matrix-exclude }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer la matrice
        id: matrix
        uses: ./.github/actions/matrix-config
        with:
          platforms:   android,web
          os-versions: ubuntu-latest,macos-latest
          include-flavors: false

  # 3. Linting
  lint:
    name: Lint du code
    needs: generate-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kotlin Lint
        run: ./gradlew ktlintCheck

      - name: JavaScript Lint
        run: |
          cd microfrontend
          npm ci
          npm run lint

  # 4. Tests unitaires et E2E
  test:
    name: Tests
    needs: generate-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix-include) }}
        exclude: ${{ fromJson(needs.generate-matrix.outputs.matrix-exclude) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11 (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Android Unit Tests
        if: matrix.platform == 'android'
        run: ./gradlew testDebugUnitTest

      - name: Setup Node.js 16 (Web)
        if: matrix.platform == 'web'
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Web Tests
        if: matrix.platform == 'web'
        run: |
          cd microfrontend
          npm ci
          npm test

  # 5. Build complet
  build:
    name: Assemblage
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble tout
        run: ./gradlew assemble

  # 6. Rapport de couverture
  coverage:
    name: Couverture de code
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generer Jacoco
        run: ./gradlew jacocoTestReport

      - name: Publier rapport
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: '**/build/reports/jacoco/test/html'

  # 7. Analyse SonarCloud
  sonar:
    name: SonarCloud Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=DETECTXPERT
            -Dsonar.organization=detectxpert-org
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
