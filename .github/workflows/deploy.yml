name: Deploy DetectXpert

permissions:
  contents: read
  id-token: write
  security-events: write
  deployments: write
  pull-requests: ${{ github.event_name == 'pull_request' && 'write' || 'read' }}
  issues: ${{ (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.release_type, 'rollback')) && 'write' || 'read' }}

env:
  JAVA_VERSION: '17'
  KOTLIN_VERSION: '1.9.23'
  NODE_VERSION: '20'
  GRADLE_OPTS: ${{ (github.job == 'build' || contains(github.job, 'test')) && '-Dorg.gradle.daemon=true -Dorg.gradle.workers.max=4 -Dkotlin.incremental=true' || '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false -Dkotlin.compiler.execution.strategy=in-process' }}
  ANDROID_COMPILE_SDK: '34'

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feature/deploy/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement de déploiement'
        required: true
        type: choice
        default: 'staging'
        options: [development, staging, production]
      platform:
        description: 'Plateforme à déployer'
        required: true
        type: choice
        default: 'all'
        options: [all, android, ios, web]
      release_type:
        description: 'Type de release'
        required: false
        type: choice
        default: 'normal'
        options: [normal, hotfix, rollback]

jobs:
  validate-inputs:
    name: Validation des entrées
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      validated: ${{ steps.validate.outputs.validated }}
    steps:
      - name: Validation des inputs
        id: validate
        run: |
          set -e
          ENV="${{ github.event.inputs.environment }}"
          PLT="${{ github.event.inputs.platform }}"
          RT="${{ github.event.inputs.release_type }}"
          if ! [[ "$ENV" =~ ^(development|staging|production)$ ]]; then
            echo "::error::Environnement invalide: $ENV" && exit 1
          fi
          if ! [[ "$PLT" =~ ^(all|android|ios|web)$ ]]; then
            echo "::error::Plateforme invalide: $PLT" && exit 1
          fi
          if ! [[ "$RT" =~ ^(normal|hotfix|rollback)$ ]]; then
            echo "::error::Type de release invalide: $RT" && exit 1
          fi
          echo "validated=true" >> $GITHUB_OUTPUT

      - name: Résumé des paramètres
        if: success()
        run: |
          echo "Environnement: ${{ github.event.inputs.environment }}"
          echo "Plateforme:   ${{ github.event.inputs.platform }}"
          echo "Type release: ${{ github.event.inputs.release_type }}"

  prepare:
    name: Préparation du Déploiement
    needs: [validate-inputs]
    if: always() && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version:       ${{ steps.version-info.outputs.version }}
      environment:   ${{ steps.env-config.outputs.environment }}
      matrix:        ${{ steps.version-info.outputs.matrix }}
      summary_file:  ${{ steps.setup-summary.outputs.summary_file }}
      web_url:       ${{ steps.env-config.outputs.web_url }}
      android_url:   ${{ steps.env-config.outputs.android_url }}
      ios_url:       ${{ steps.env-config.outputs.ios_url }}
      is_rollback:   ${{ steps.env-config.outputs.is_rollback }}
      release_type:  ${{ steps.env-config.outputs.release_type }}
      deployment_id: ${{ steps.create-deployment.outputs.deployment_id }}

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Initialisation du résumé
        id: setup-summary
        run: |
          set -e
          FILE="deployment-summary.md"
          echo "summary_file=$FILE" >> $GITHUB_OUTPUT
          echo "# Résumé du Déploiement DetectXpert" > $FILE
          echo "" >> $FILE
          echo "- Date: $(date)"    >> $FILE
          echo "- Commit: ${{ github.sha }}" >> $FILE
          echo "- Workflow: ${{ github.workflow }}" >> $FILE
          echo "- Déclencheur: ${{ github.event_name }}" >> $FILE
          echo "- Exécuteur: ${{ github.actor }}"     >> $FILE
          echo "" >> $FILE

      - name: Configuration de l’environnement
        id: env-config
        run: |
          set -e
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            RT="${{ github.event.inputs.release_type }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ENV="production"; RT="normal"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            ENV="staging";    RT="normal"
          else
            ENV="development"; RT="normal"
          fi
          IS_ROLLBACK=false
          [[ "$RT" == "rollback" ]] && IS_ROLLBACK=true

          # URLs selon environnement
          if   [[ "$ENV" == "production" ]]; then
            WEB="https://${{ secrets.PROD_DOMAIN_NAME }}"
            ANDR="https://play.google.com/store/apps/details?id=com.detectxpert"
            IOS="https://apps.apple.com/app/detectxpert/id1234567890"
          elif [[ "$ENV" == "staging" ]]; then
            WEB="https://${{ secrets.STAGING_DOMAIN_NAME }}"
            ANDR="https://appdistribution.firebase.dev/i/${{ secrets.FIREBASE_APP_ID_ANDROID }}"
            IOS="https://testflight.apple.com/join/${{ secrets.TESTFLIGHT_INVITATION_CODE }}"
          else
            WEB="https://${{ secrets.FIREBASE_PROJECT_ID }}-$ENV.web.app"
            ANDR="https://appdistribution.firebase.dev/i/${{ secrets.FIREBASE_APP_ID_ANDROID }}"
            IOS="https://testflight.apple.com/join/${{ secrets.TESTFLIGHT_INVITATION_CODE }}"
          fi

          echo "environment=$ENV"       >> $GITHUB_OUTPUT
          echo "release_type=$RT"       >> $GITHUB_OUTPUT
          echo "is_rollback=$IS_ROLLBACK" >> $GITHUB_OUTPUT
          echo "web_url=$WEB"           >> $GITHUB_OUTPUT
          echo "android_url=$ANDR"      >> $GITHUB_OUTPUT
          echo "ios_url=$IOS"           >> $GITHUB_OUTPUT

      - name: Version & Matrice
        id: version-info
        run: |
          set -e
          # Version
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V=${GITHUB_REF#refs/tags/v}
          else
            V=$(./gradlew -q printVersion)
            S=$(echo $GITHUB_SHA|cut -c1-8)
            V="${V}-${S}"
            [[ "${{ steps.env-config.outputs.release_type }}" == "hotfix" ]] && V="${V}-hotfix"
          fi
          # Matrice
          if [[ "${{ github.event_name }}"=="workflow_dispatch" && "${{ github.event.inputs.platform}}"!="all" ]]; then
            P='["'${{ github.event.inputs.platform }}'"]'
          else
            P='["android","ios","web"]'
          fi
          echo "version=$V"                    >> $GITHUB_OUTPUT
          echo "matrix={\"platform\":$P}"      >> $GITHUB_OUTPUT
          echo "## Configuration"             >> ${{ steps.setup-summary.outputs.summary_file }}
          echo "- Version: $V"                 >> ${{ steps.setup-summary.outputs.summary_file }}
          echo "- Environnement: ${{ steps.env-config.outputs.environment }}" >> ${{ steps.setup-summary.outputs.summary_file }}
          echo "- Release type: ${{ steps.env-config.outputs.release_type }}" >> ${{ steps.setup-summary.outputs.summary_file }}
          echo "- Plateformes: $(echo $P|tr -d '[]"')" >> ${{ steps.setup-summary.outputs.summary_file }}

      - name: Création du déploiement GitHub
        id: create-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const d = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "${{ steps.env-config.outputs.environment }}",
              required_contexts: [],
              auto_merge: false,
              description: `DetectXpert v${{ steps.version-info.outputs.version }}`,
              production_environment: "${{ steps.env-config.outputs.environment }}" === "production"
            });
            core.setOutput('deployment_id', d.data.id);
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: d.data.id,
              state: 'in_progress',
              description: 'En cours',
              environment_url: "${{ steps.env-config.outputs.web_url }}"
            });

  security-scan:
    name: Analyse de Sécurité
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Initialisation CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript, kotlin, ruby, python
          queries: security-extended, security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild pour CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v3
        with: { category: "/language:java,javascript,kotlin,ruby,python" }

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-results.sarif }

      - name: SonarCloud Scan
        if: needs.env-config.outputs.environment != 'development'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Mise à jour résumé sécurité
        env: { SUMMARY_FILE: ${{ steps.setup-summary.outputs.summary_file }} }
        run: |
          echo "## Résultats Sécu" >> $SUMMARY_FILE
          echo "✅ CodeQL" >> $SUMMARY_FILE
          echo "✅ Trivy" >> $SUMMARY_FILE
          if [[ "${{ steps.env-config.outputs.environment }}" != "development" ]]; then
            echo "✅ SonarCloud" >> $SUMMARY_FILE
          fi

  mobile-security:
    name: Sécurité Mobile
    needs: [prepare, security-scan]
    if: |
      !contains(fromJson(needs.prepare.outputs.matrix).platform,'web')
      &&
      (contains(fromJson(needs.prepare.outputs.matrix).platform,'android')
       || contains(fromJson(needs.prepare.outputs.matrix).platform,'ios'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MobSF scan
        uses: MobSF/mobsfscan-action@v0.0.5
        with:
          output-format: sarif
          sarif-filename: mobsfscan-results.sarif

      - name: Upload MobSF SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mobsfscan-results.sarif
          category: mobile-security

      - name: Mise à jour résumé mobile
        env: { SUMMARY_FILE: ${{ steps.setup-summary.outputs.summary_file }} }
        run: |
          echo "### Sécu Mobile" >> $SUMMARY_FILE
          echo "✅ MobSF" >> $SUMMARY_FILE

  build:
    name: Build & Tests
    needs: [prepare, security-scan]
    runs-on: ${{ matrix.platform == 'ios' && 'macos-14' || 'ubuntu-latest' }}
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: ${{ env.JAVA_VERSION }}, cache: gradle }

      - name: Setup Node (Web)
        if: matrix.platform=='web'
        uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}, cache: npm }

      - name: Cache Web deps
        if: matrix.platform=='web'
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            platform/web/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('platform/web/package-lock.json') }}

      - name: Setup iOS (Pods)
        if: matrix.platform=='ios'
        uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: '15.0' }

      - name: Cache Pods
        if: matrix.platform=='ios'
        uses: actions/cache@v4
        with:
          path:
            - ~/.cocoapods
            - platform/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('platform/ios/Podfile.lock') }}

      - name: pod install (iOS)
        if: matrix.platform=='ios'
        run: |
          gem install cocoapods
          cd platform/ios && pod install --repo-update

      - name: Validate Gradle Wrapper
        run: |
          chmod +x ./gradlew
          ./gradlew wrapper --validate

      - name: ktlint
        run: |
          mkdir -p logs
          ./gradlew ktlintCheck > logs/ktlint-${{ matrix.platform }}.log || { cat logs/ktlint-${{ matrix.platform }}.log; exit 1; }

      - name: detekt
        run: |
          mkdir -p logs
          ./gradlew detekt > logs/detekt-${{ matrix.platform }}.log || { cat logs/detekt-${{ matrix.platform }}.log; exit 1; }

      - name: Unit tests
        run: |
          mkdir -p logs
          ./gradlew :tests:unit:test${{ matrix.platform != 'all' && matrix.platform || '' }}UnitTest jacocoTestReport > logs/unit-${{ matrix.platform }}.log || { cat logs/unit-${{ matrix.platform }}.log; exit 1; }

      - name: Integration tests
        run: |
          mkdir -p logs
          ./gradlew :tests:integration:test${{ matrix.platform != 'all' && matrix.platform || '' }}IntegrationTest > logs/integration-${{ matrix.platform }}.log || { cat logs/integration-${{ matrix.platform }}.log; exit 1; }

      - name: Build app
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ENV:     ${{ needs.prepare.outputs.environment }}
          SUMMARY_FILE: ${{ needs.prepare.outputs.summary_file }}
        run: |
          BUILD="${{ needs.prepare.outputs.environment == 'production' && 'Production' || (needs.prepare.outputs.environment == 'staging' && 'Staging' || 'Development') }}"
          if [[ "${{ matrix.platform }}"=="android" ]]; then
            ./gradlew :platform:android:assemble$BUILD :platform:android:bundle$BUILD
          elif [[ "${{ matrix.platform }}"=="ios" ]]; then
            ./gradlew :platform:ios:assemble$BUILD
          else
            ./gradlew :platform:web:build$BUILD
          fi

  device-testing:
    name: Tests sur Appareils Réels
    needs: [prepare, build]
    if: |
      needs.prepare.outputs.environment != 'development' &&
      (contains(fromJson(needs.prepare.outputs.matrix).platform,'android') ||
       contains(fromJson(needs.prepare.outputs.matrix).platform,'ios'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.matrix).platform }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup gcloud
        run: |
          apt-get update && apt-get install -y curl
          curl https://sdk.cloud.google.com | bash -s -- --disable-prompts
          source $HOME/google-cloud-sdk/path.bash.inc

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.platform }}-build-${{ needs.prepare.outputs.version }}
          path: build-out

      - name: Firebase TestLab (${{ matrix.platform }})
        run: |
          mkdir -p test-results
          if [[ "${{ matrix.platform }}"=="android" ]]; then
            APK=$(find build-out -name "*.apk" | head -n1)
            gcloud firebase test android run --type instrumentation \
              --app "$APK" --device model=Pixel7,version=33 \
              --results-bucket ${{ secrets.FIREBASE_TEST_BUCKET }} \
              --results-dir="${{ needs.prepare.outputs.version }}/android" \
              > test-results/android.txt
          else
            IPA=$(find build-out -name "*.ipa" | head -n1)
            gcloud firebase test ios run --type xctest \
              --app "$IPA" --device model=iphone14pro,version=16.6 \
              --results-bucket ${{ secrets.FIREBASE_TEST_BUCKET }} \
              --results-dir="${{ needs.prepare.outputs.version }}/ios" \
              > test-results/ios.txt
          fi

      - name: Upload test-results
        uses: actions/upload-artifact@v4
        with:
          path: test-results
          name: ${{ matrix.platform }}-tests-${{ needs.prepare.outputs.version }}

  deploy-android:
    name: Déploiement Android
    needs: [prepare, build, security-scan]
    if: |
      contains(fromJson(needs.prepare.outputs.matrix).platform,'android') &&
      needs.prepare.outputs.is_rollback!='true' &&
      needs.prepare.outputs.environment!='development'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url:  ${{ needs.prepare.outputs.android_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with: { name: android-build-${{ needs.prepare.outputs.version }}, path: android-build }
      - name: Deploy Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.detectxpert
          releaseFiles: android-build/**/*.aab
          track: ${{ needs.prepare.outputs.environment=='production' && 'production' || 'internal' }}
          status: completed
      - name: Firebase Distribution
        if: needs.prepare.outputs.environment!='production'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers,beta-testers
          file: android-build/**/*.apk

  deploy-ios:
    name: Déploiement iOS
    needs: [prepare, build, security-scan]
    if: |
      contains(fromJson(needs.prepare.outputs.matrix).platform,'ios') &&
      needs.prepare.outputs.is_rollback!='true' &&
      needs.prepare.outputs.environment!='development'
    runs-on: macos-14
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url:  ${{ needs.prepare.outputs.ios_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with: { name: ios-build-${{ needs.prepare.outputs.version }}, path: ios-build }
      - name: Import certs
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password:    ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      - name: Upload TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ios-build/**/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  deploy-web:
    name: Déploiement Web
    needs: [prepare, build, security-scan]
    if: contains(fromJson(needs.prepare.outputs.matrix).platform,'web') && needs.prepare.outputs.is_rollback!='true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url:  ${{ needs.prepare.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with: { name: web-build-${{ needs.prepare.outputs.version }}, path: web-build }
      - name: Backup current (S3)
        run: |
          # (… backup script …)
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sync S3 & invalidate
        run: |
          aws s3 sync web-build/platform/web/build/distributions/ s3://${{ needs.prepare.outputs.environment=='production' && secrets.PROD_S3_BUCKET || secrets.STAGING_S3_BUCKET }}/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  rollback:
    name: Rollback
    needs: prepare
    if: needs.prepare.outputs.is_rollback=='true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url:  ${{ needs.prepare.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Exécuter rollback (AWS / TestFlight / PlayStore)
        run: |
          echo "… votre script de rollback …"

  notify:
    name: Notification finale
    needs: [deploy-android, deploy-ios, deploy-web, rollback]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Envoyer résumé et Slack
        run: |
          echo "… notification finale …"

  finalize:
    name: Finalisation
    needs: notify
    runs-on: ubuntu-latest
    steps:
      - name: Mettre à jour statut GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            // … mise à jour …

  monitoring:
    name: Monitoring Post-Déploiement
    needs: finalize
    if: needs.finalize.result=='success' && needs.prepare.outputs.environment!='development'
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier site web en ligne
        run: |
          # … boucle curl …
      - name: Envoyer alerte Slack
        run: |
          # … payload Slack …

