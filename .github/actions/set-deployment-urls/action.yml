name: 'Set Deployment URLs'
description: 'Configure les URLs de déploiement pour les différents environnements de DetectXpert'
author: 'DetectXpert Team'

inputs:
  environment:
    description: 'Environnement de déploiement'
    required: true
    type: string
    allowed-values: [ dev, staging, prod ]
  version:
    description: 'Version ou tag du déploiement (format SemVer recommandé: x.y.z[-pré][+build])'
    required: true
    type: string
  base-domain:
    description: 'Domaine de base pour les URLs de déploiement (ex: detectxpert.com)'
    required: false
    type: string
    default: 'detectxpert.com'
  include-version-in-url:
    description: 'Inclure la version dans l''URL de déploiement'
    required: false
    type: boolean
    default: false
  custom-prefix:
    description: 'Préfixe personnalisé pour les URLs (remplace environment si spécifié)'
    required: false
    type: string
  use-https:
    description: 'Utiliser HTTPS pour les URLs'
    required: false
    type: boolean
    default: true

outputs:
  main-url:
    description: 'URL principale de l''application'
    value: ${{ steps.set-urls.outputs.main-url }}
  api-url:
    description: 'URL de l''API'
    value: ${{ steps.set-urls.outputs.api-url }}
  dashboard-url:
    description: 'URL du tableau de bord administrateur'
    value: ${{ steps.set-urls.outputs.dashboard-url }}
  docs-url:
    description: 'URL de la documentation'
    value: ${{ steps.set-urls.outputs.docs-url }}
  deployment-id:
    description: 'Identifiant unique du déploiement'
    value: ${{ steps.set-urls.outputs.deployment-id }}

runs:
  using: 'composite'
  steps:
    - name: Rendre le script exécutable
      run: chmod +x ${{ github.action_path }}/set-deployment-urls.sh

    - name: Exécuter le script Set Deployment URLs
      shell: bash
      run: ${{ github.action_path }}/set-deployment-urls.sh
