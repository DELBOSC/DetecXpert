name: 'Set Deployment URLs'
description: 'Génère et exporte les URLs de déploiement (web, Android, iOS) selon l’environnement'
author: 'DetectXpert DevOps Team'
repository: 'https://github.com/DELBOSC/DetectXpert'
homepage: 'https://github.com/DELBOSC/DetectXpert/.github/actions/set-deployment-urls'

inputs:
  environment:
    description: 'Environnement de déploiement (development, staging, production)'
    required: true
    type: string
  version:
    description: 'Version ou tag (SemVer x.y.z[-pré][+build])'
    required: true
    type: string
  base-domain:
    description: 'Domaine de base pour les URLs (ex: detectxpert.com)'
    required: true
    type: string

outputs:
  web_url:
    description: 'URL Web générée'
  android_url:
    description: 'URL Android générée'
  ios_url:
    description: 'URL iOS générée'

runs:
  using: composite
  steps:
    - name: Check & prepare
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/set-deployment-urls.sh"
    - name: Generate URLs
      id: generate
      shell: bash
      run: |
        set -e
        "${{ github.action_path }}/set-deployment-urls.sh" \
          --environment "${{ inputs.environment }}" \
          --version "${{ inputs.version }}" \
          --domain   "${{ inputs.base-domain }}"
        # Le script écrit dans GITHUB_OUTPUT : web_url, android_url, ios_url
