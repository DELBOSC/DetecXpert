name: 'Matrix Configuration Generator'
description: 'Génère une stratégie matrix dynamique pour CI/CD'
author: 'DetectXpert DevOps Team'

inputs:
  platforms:
    type: string
    required: false
    default: 'android,ios,web,desktop'
    description: 'Liste des plateformes (virgule séparées)'
  os-versions:
    type: string
    required: false
    default: ''
    description: 'versions d’OS (vide = valeurs par défaut par plateforme)'
  include-flavors:
    type: boolean
    required: false
    default: true
    description: 'Inclure les flavors'
  dimensions:
    type: string
    required: false
    default: '[]'
    description: 'Axes supplémentaires au format JSON'
  debug:
    type: boolean
    required: false
    default: false
    description: 'Mode debug'

outputs:
  matrix:
    description: 'Stratégie matrix JSON'
  matrix-include:
    description: 'Combinaisons à inclure'
  matrix-exclude:
    description: 'Combinaisons à exclure'
  total-combinations:
    description: 'Nombre total de combinaisons'

runs:
  using: composite
  steps:
    - name: Check prerequisites
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/matrix-config.sh"
        command -v jq >/dev/null 2>&1 || { echo "::error::jq manquant"; exit 1; }
    - name: Setup env
      shell: bash
      run: |
        cat <<EOF >> $GITHUB_ENV
PLATFORMS=${{ inputs.platforms }}
OS_VERSIONS=${{ inputs.os-versions }}
INCLUDE_FLAVORS=${{ inputs.include-flavors }}
DIMENSIONS=${{ inputs.dimensions }}
DEBUG=${{ inputs.debug }}
EOF
    - name: Generate matrix
      id: generate-matrix
      shell: bash
      run: |
        "${{ github.action_path }}/matrix-config.sh" \
          --platforms        "$PLATFORMS" \
          --os-versions      "$OS_VERSIONS" \
          --include-flavors  "$INCLUDE_FLAVORS" \
          --dimensions       "$DIMENSIONS" \
          $([[ "$DEBUG" == "true" ]] && echo "--debug")
