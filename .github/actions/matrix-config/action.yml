name: 'Matrix Configuration Generator'
description: 'Génère une stratégie matrix dynamique pour CI/CD'
author: 'DetectXpert DevOps Team'
repository: 'https://github.com/DELBOSC/DetectXpert'
homepage: 'https://github.com/DELBOSC/DetectXpert/.github/actions/matrix-config'

inputs:
  platforms:
    type: string
    required: false
    default: 'android,ios,web,desktop'
    description: 'Liste des plateformes (virgule séparées)'
  os-versions:
    type: string
    required: false
    default: ''
    description: 'Versions d’OS (virgule séparées, vide = valeurs par défaut)'
  include-flavors:
    type: boolean
    required: false
    default: true
    description: 'Inclure les flavors'
  dimensions:
    type: string
    required: false
    default: '[]'
    description: 'Axes supplémentaires au format JSON'
  debug:
    type: boolean
    required: false
    default: false
    description: 'Mode debug'

outputs:
  matrix:
    description: 'Stratégie matrix JSON complète'
  matrix-include:
    description: 'Combinaisons à inclure'
  matrix-exclude:
    description: 'Combinaisons à exclure'
  total-combinations:
    description: 'Nombre total de combinaisons générées'

runs:
  using: 'composite'
  steps:
    - name: Rendre le script exécutable
      shell: bash
      run: chmod +x "${{ github.action_path }}/matrix_config.sh"

    - name: Préparer les variables d’environnement
      shell: bash
      run: |
        echo "PLATFORMS=${{ inputs.platforms }}"      >> $GITHUB_ENV
        echo "OS_VERSIONS=${{ inputs.os-versions }}"  >> $GITHUB_ENV
        echo "INCLUDE_FLAVORS=${{ inputs.include-flavors }}" >> $GITHUB_ENV
        echo "DIMENSIONS=${{ inputs.dimensions }}"    >> $GITHUB_ENV
        echo "DEBUG=${{ inputs.debug }}"              >> $GITHUB_ENV

    - name: Générer la matrice
      id: generate-matrix
      shell: bash
      run: |
        ${{ github.action_path }}/matrix_config.sh \
          --platforms        "$PLATFORMS" \
          --os-versions      "$OS_VERSIONS" \
          --include-flavors  "$INCLUDE_FLAVORS" \
          --dimensions       "$DIMENSIONS" \
          $([[ "$DEBUG" == "true" ]] && echo "--debug")
