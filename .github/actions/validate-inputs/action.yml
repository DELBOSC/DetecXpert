name: 'Validate Inputs'
description: 'Valide les inputs fournis aux workflows DetectXpert'
author: 'DetectXpert Team'

inputs:
  # … liste des inputs existants pour validate-inputs …
outputs:
  validated:
    description: 'Booléen : inputs valides ou non'

runs:
  using: 'composite'
  steps:
    - name: Rendre le script exécutable
      run: chmod +x ${{ github.action_path }}/validate-inputs.sh

    - name: Exécuter Validate Inputs
      shell: bash
      run: ${{ github.action_path }}/validate-inputs.sh
