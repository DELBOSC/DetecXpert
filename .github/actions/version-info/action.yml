name: 'Version Info Generator'
description: 'Détermine la version courante et génère la matrice de build'
author: 'DetectXpert DevOps Team'

inputs:
  # vous n’avez normalement rien à configurer ici,
  # ce bloc est pour exposer la composite action si besoin
  dummy:
    description: '(aucun paramètre requis)'
    required: false

outputs:
  version:
    description: 'Version calculée (x.y.z)'
  matrix:
    description: 'Matrice de plateformes pour le job de build'

runs:
  using: composite
  steps:
    - name: Prepare script
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/version-info.sh"
    - name: Generate version & matrix
      id: gen
      shell: bash
      run: |
        "${{ github.action_path }}/version-info.sh"
