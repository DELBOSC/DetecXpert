name: 'Detect Environment'
description: "Détecte les caractéristiques de l'environnement d'exécution pour les workflows DetectXpert"
author: 'DetectXpert DevOps Team'
repository: 'https://github.com/DELBOSC/DetectXpert'
homepage: 'https://github.com/DELBOSC/DetectXpert/.github/actions/detect-environment'

inputs:
  debug:
    type: boolean
    required: false
    default: false
    description: 'Active le mode debug avec logs détaillés'
  verify_dependencies:
    type: boolean
    required: false
    default: true
    description: 'Vérifie la présence des dépendances requises'
  output_format:
    type: string
    required: false
    default: 'json'
    description: "Format de sortie pour les outputs: json, yaml ou text"
  detect_hardware:
    type: boolean
    required: false
    default: true
    description: 'Détecte les capacités matérielles (CPU, mémoire, disque)'
  detect_network:
    type: boolean
    required: false
    default: false
    description: 'Détecte les informations réseau'
  detect_dependencies:
    type: boolean
    required: false
    default: true
    description: 'Détecte les versions des dépendances logicielles'
  detect_github_context:
    type: boolean
    required: false
    default: true
    description: 'Détecte le contexte GitHub Actions'
  required_dependencies:
    type: string
    required: false
    default: 'jq,grep,xargs'
    description: 'Liste des dépendances à vérifier, séparées par des virgules'
  performance_test:
    type: boolean
    required: false
    default: false
    description: 'Effectue des tests de performance (CPU/disque)'

outputs:
  os_info:
    description: 'Infos système (OS, version, distro)'
    value: ${{ steps.detect.outputs.os_info }}
  hardware_info:
    description: 'Infos matériel (CPU, mémoire, disque)'
    value: ${{ steps.detect.outputs.hardware_info }}
  software_info:
    description: 'Versions des dépendances logicielles'
    value: ${{ steps.detect.outputs.software_info }}
  github_context:
    description: 'Contexte GitHub Actions'
    value: ${{ steps.detect.outputs.github_context }}
  network_info:
    description: 'Données de connectivité réseau'
    value: ${{ steps.detect.outputs.network_info }}
  performance_metrics:
    description: 'Métriques de performance (si performance_test=true)'
    value: ${{ steps.detect.outputs.performance_metrics }}
  is_valid:
    description: 'Environnement valide (true/false)'
    value: ${{ steps.detect.outputs.is_valid }}
  validation_errors:
    description: 'Liste des problèmes détectés'
    value: ${{ steps.detect.outputs.validation_errors }}
  environment_id:
    description: 'Identifiant unique de l’environnement'
    value: ${{ steps.detect.outputs.environment_id }}
  summary:
    description: 'Résumé des informations essentielles'
    value: ${{ steps.detect.outputs.summary }}

runs:
  using: composite
  steps:
    - name: Check prerequisites
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/detect-environment.sh"
        command -v jq >/dev/null 2>&1 || { echo "::error::jq manquant"; exit 1; }
    - name: Detect environment
      id: detect
      shell: bash
      env:
        DETECT_DEBUG: ${{ inputs.debug }}
        DETECT_OUTPUT_FORMAT: ${{ inputs.output_format }}
      run: |
        ${{ github.action_path }}/detect-environment.sh
