name: 'Previous Version Extractor'
description: 'Extrait la version précédente pour la gestion des releases'
author: 'DetectXpert Team'

permissions:
  contents: read
  actions: read

inputs:
  repo-token:
    required: true
    description: 'Token pour accéder au dépôt'
  skip-checkout:
    required: false
    default: 'false'
    description: 'Ignorer le checkout intégré'
  json-output:
    required: false
    default: 'false'
    description: 'Générer un fichier JSON complet'

outputs:
  previous-version:
    description: 'Version précédente (x.y.z)'
  major:
    description: 'Composante majeure'
  minor:
    description: 'Composante mineure'
  patch:
    description: 'Composante patch'
  changelog-url:
    description: 'URL des notes de version'

runs:
  using: composite
  steps:
    - name: Checkout (if needed)
      if: ${{ inputs.skip-checkout != 'true' }}
      uses: actions/checkout@v4
    - name: Prepare script
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/previous-version.sh"
    - name: Extract previous version
      id: prev
      shell: bash
      run: |
        "${{ github.action_path }}/previous-version.sh" \
          --repo-token "${{ inputs.repo-token }}" \
          $([[ "${{ inputs.json-output }}" == "true" ]] && echo "--json")
