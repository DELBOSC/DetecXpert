name: 'Previous Version Extractor'
description: 'Extrait et analyse la version précédente de DetectXpert'
author: 'DetectXpert Team'

permissions:
  contents: read
  actions: read

inputs:
  repo-token:
    description: 'Token GitHub pour accéder aux versions et tags du dépôt'
    required: true
  skip-checkout:
    description: 'Ignorer l''étape de checkout intégrée'
    required: false
    default: 'false'
  # … autres inputs existants …

outputs:
  previous-version:
    description: 'La version précédente au format semver (x.y.z)'
  major:
    description: 'Composante majeure'
  minor:
    description: 'Composante mineure'
  patch:
    description: 'Composante patch'
  # … autres outputs existants …

runs:
  using: 'composite'
  steps:
    - name: Rendre le script exécutable
      run: chmod +x ${{ github.action_path }}/previous-version.sh

    - name: Exécuter Previous Version Extractor
      shell: bash
      run: ${{ github.action_path }}/previous-version.sh
